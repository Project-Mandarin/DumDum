name: Build

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'metadata/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 17
  GO_VERSION: 1.24.2
#NDK_VERSION: 25.2.9519653
#BUILD_TOOLS_VERSION: 35.0.1

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
#    container:
#      image: cimg/android:2023.09-ndk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;25.2.9519653 platforms;android-35 build-tools;35.0.1"
          log-accepted-android-sdk-licenses: false

      - run: java -version
      - run: cmake -version
      - run: env | sort

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./libcore/go.sum

      - name: Build libcore
        run: bash -x ./libcore/scripts/build.sh

      - name: Build DumDum
        env:
          ALIAS_NAME: dumdum
          ALIAS_PASS: "${{ secrets.JKS_PASS }}"
          KEYSTORE_PASS: "${{ secrets.JKS_PASS }}"
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ndk.dir=${ANDROID_NDK_ROOT}" >> local.properties
          echo "${{ secrets.JKS_B64 }}" | base64 --decode >> dumdum.jks
          mkdir -v ./app/libs
          mv -v ./libcore/libcore.aar ./app/libs/libcore.aar
          ./gradlew app:assembleGitHubRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "DumDum-${{ github.run_number }}"
          path: ./app/build/outputs/apk/github/release/*.apk
